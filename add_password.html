<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .window {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 320px;
        }
        .window h2 {
            margin-top: 0;
            margin-bottom: 20px;
            color: #333333;
            font-size: 20px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #666666;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .input-group input:focus {
            border-color: #007bff;
            outline: none;
        }
        .submit-btn {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        .submit-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="window">
        <h2>Add Password Details</h2>
        <form>
            <div class="input-group">
                <label>Website</label>
                <input type="text" id="website-input" placeholder="Enter website url">
            </div>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username-input" placeholder="Enter username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="pw-input" placeholder="Enter password">
                <label>Show Password</label>
                <input type="checkbox" onclick="passwordVisibility()">
            </div>
        </form>
        <button type="button" id="submit-pass" class="submit-btn" onclick="addRow()">Submit</button>
    </div>

</body>
<script src="src/index.js" defer></script>
</html>

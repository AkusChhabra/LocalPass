<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LocalPass</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:#f4f7fb;
    display:flex;
    min-height:100vh;
}


a {
    color: inherit;
    text-decoration: inherit;
}

.sidebar{
    width:260px;
    background:#111827;
    color:white;
    padding:25px;
}

.logo{
    font-size:24px;
    font-weight:bold;
    margin-bottom:40px;
}

.nav{
    list-style:none;
}

.nav li{
    padding:14px;
    margin-bottom:10px;
    border-radius:10px;
    cursor:pointer;
    transition:.3s;
}

.nav li:hover,
.nav li.active{
    background:#1f2937;
}

.main{
    flex:1;
    padding:30px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.header h1{
    color:#1f2937;
}

.add-btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}

.add-btn:hover{
    background:#1d4ed8;
}

.del-btn{
    background:#e63e3e;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}

.del-btn:hover{
    background:#b30404;
}

.top-cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:white;
    border-radius:16px;
    padding:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.card-title{
    color:#6b7280;
    margin-bottom:10px;
}

.card-value{
    font-size:30px;
    font-weight:bold;
    color:#111827;
}

.security-score{
    color:#10b981;
}

.search-bar{
    margin-bottom:20px;
}

.search-bar input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid #d1d5db;
    font-size:15px;
}

.content{
    display:grid;
    grid-template-columns:2fr 0fr;
    gap:20px;
}

.table-card,
.activity-card{
    background:white;
    border-radius:16px;
    padding:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.section-title{
    margin-bottom:15px;
    color:#111827;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    text-align:left;
    padding:12px;
    background:#f3f4f6;
    color:#374151;
}

td{
    padding:12px;
    border-bottom:1px solid #e5e7eb;
}

.status{
    display:inline-block;
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
    font-weight:bold;
}

.strong{
    background:#dcfce7;
    color:#15803d;
}

.medium{
    background:#fef3c7;
    color:#b45309;
}

.activity{
    padding:12px 0;
    border-bottom:1px solid #eee;
}

.activity:last-child{
    border:none;
}

.activity-time{
    font-size:12px;
    color:#6b7280;
}

@media(max-width:900px){
    .content{
        grid-template-columns:1fr;
    }

    .sidebar{
        display:none;
    }
}
</style>
</head>
<body>

<div class="sidebar">
    <div class="logo">LocalPass</div>
    <ul class="nav">
        <nav class="nav active">
            <li><a href="index.html" class="nav active">Dashboard</a></li>
            <li><a href="passwords.html" class="nav">Passwords</a></li>
           <li> <a href="settings.html" class="nav">Settings</a></li>
        </nav>
    </ul>
</div>

<div class="main">
    <div class="header">
        <h1>Dashboard</h1>
        <button id="add-pass-btn" class="add-btn" onclick="openPassWindow()">+ Add Password</button>
    </div>

    <div class="top-cards">
        <div class="card">
            <div class="card-title">Stored Passwords</div>
            <div class="card-value">128</div>
        </div>

        <div class="card">
            <div class="card-title">Security Score</div>
            <div class="card-value security-score">92%</div>
        </div>

        <div class="card">
            <div class="card-title">Weak Passwords</div>
            <div class="card-value">4</div>
        </div>

        <div class="card">
            <div class="card-title">Last Backup</div>
            <div class="card-value" style="font-size:18px;">
                Today 09:30
            </div>
        </div>
    </div>

    <div class="search-bar">
        <input type="text" placeholder="Search passwords, websites, or usernames...">
    </div>

    <div class="content">

        <div class="table-card">
            <h3 class="section-title">Saved Credentials</h3>
            <table id="password-table">
                <thead>
                    <tr>
                        <th>Website</th>
                        <th>Username</th>
                        <th>Password</th>
                        <th>Last Updated</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>Google</td>
                        <td>john.doe@gmail.com</td>
                        <td>********</td>
                        <td>2 days ago</td>
                        <td><button class="del-btn" onclick="deleteThisRow(this)">Delete</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
<script src="src/index.js"></script>
<script>

const data = [
  { id: 1, name: "Google", password: "Developer" },
];

function queryData(dataArray, inputString) {

  const query = inputString.toLowerCase().trim();
  
  return dataArray.filter(item => 
    item.name.toLowerCase().includes(query)
  );
}


</script>
</html>
